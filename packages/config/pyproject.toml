[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kavach-config"
version = "0.1.0"
description = "Typed configuration settings for Kavach AI"
requires-python = ">=3.11"
dependencies = [
    "pydantic-settings>=2.3.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["kavach_config*"]
